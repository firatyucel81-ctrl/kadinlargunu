<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Mart Dünya Kadınlar Günü</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap');

        body {
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            z-index: 10;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #d81b60;
            font-size: 3.5rem;
            margin-bottom: 1rem;
            animation: slideDown 1s ease-out;
        }

        p {
            color: #4a148c;
            line-height: 1.6;
            margin-bottom: 2rem;
            animation: slideUp 1s ease-out 0.5s both;
        }

        .flower {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            opacity: 0.6;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .celebrate-btn {
            background: linear-gradient(45deg, #d81b60, #8e24aa);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.3);
            animation: pulse 2s infinite;
        }

        .celebrate-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(216, 27, 96, 0.5);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .heart {
            color: #e91e63;
            display: inline-block;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
            75% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="flower-container"></div>

    <div class="card">
        <h1>8 Mart</h1>
        <h2 class="text-2xl font-semibold text-pink-600 mb-4">Dünya Kadınlar Günü Kutlu Olsun!</h2>
        <p class="text-gray-700 italic">
            "Dünyayı sevgisiyle güzelleştiren, emeğiyle yücelten ve varlığıyla ışık saçan tüm kadınların bu özel günü kutlu olsun."
        </p>
        <div class="mb-6">
            <span class="heart text-3xl">♥</span>
        </div>
        <button class="celebrate-btn" onclick="createConfetti()">Sevgi Gönder</button>
    </div>

    <script>
        // Arka plana çiçek emojileri ekleme
        const container = document.getElementById('flower-container');
        const flowers = ['🌸', '🌺', '🌷', '🌹', '🌻', '✨'];
        
        function spawnFlowers() {
            for (let i = 0; i < 20; i++) {
                const flower = document.createElement('div');
                flower.className = 'flower';
                flower.innerText = flowers[Math.floor(Math.random() * flowers.length)];
                flower.style.left = Math.random() * 100 + 'vw';
                flower.style.top = Math.random() * 100 + 'vh';
                flower.style.fontSize = (Math.random() * 20 + 20) + 'px';
                flower.style.animationDelay = Math.random() * 5 + 's';
                flower.style.animationDuration = (Math.random() * 3 + 4) + 's';
                container.appendChild(flower);
            }
        }

        function createConfetti() {
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.innerText = flowers[Math.floor(Math.random() * flowers.length)];
                confetti.style.position = 'fixed';
                confetti.style.left = '50%';
                confetti.style.top = '50%';
                confetti.style.zIndex = '100';
                confetti.style.pointerEvents = 'none';
                
                const destinationX = (Math.random() - 0.5) * 800;
                const destinationY = (Math.random() - 0.5) * 800;
                
                confetti.animate([
                    { transform: 'translate(-50%, -50%) scale(0)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${destinationX}px), calc(-50% + ${destinationY}px)) scale(1.5) rotate(360deg)`, opacity: 0 }
                ], {
                    duration: 1500,
                    easing: 'cubic-bezier(0, .9, .57, 1)',
                    fill: 'forwards'
                });

                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 1500);
            }
        }

        window.onload = spawnFlowers;
    </script>
</body>
</html>
